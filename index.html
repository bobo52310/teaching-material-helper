<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教材小幫手 - Teaching Material Helper</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#4db6ac;--primary-dark:#00897b;--primary-light:#b2dfdb;
    --accent:#ff8a65;--bg:#f0f7f7;--card:#ffffff;--text:#37474f;
    --text-light:#78909c;--shadow:0 4px 20px rgba(0,0,0,.08);
    --radius:16px;
  }
  body{font-family:'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

  /* header */
  .header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;text-align:center;padding:2rem 1rem 1.5rem;position:relative;overflow:hidden}
  .header::after{content:'';position:absolute;bottom:-30px;left:-10%;width:120%;height:60px;background:var(--bg);border-radius:50% 50% 0 0}
  .header h1{font-size:1.8rem;font-weight:700;margin-bottom:.3rem}
  .header p{font-size:.95rem;opacity:.9}
  .header .emoji{font-size:2.4rem;margin-bottom:.4rem;display:block}

  /* container */
  .container{max-width:680px;margin:0 auto;padding:0 1rem 3rem}

  /* cards */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1.2rem;transition:transform .2s}
  .card-title{display:flex;align-items:center;gap:.5rem;font-size:1.05rem;font-weight:600;margin-bottom:1rem;color:var(--primary-dark)}
  .card-title .step{background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}

  /* upload */
  .upload-zone{border:2px dashed var(--primary-light);border-radius:14px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .25s;position:relative;background:#f8fffe}
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:#e8f5f3}
  .upload-zone input{display:none}
  .upload-zone .icon{font-size:2.5rem;margin-bottom:.5rem}
  .upload-zone p{color:var(--text-light);font-size:.9rem}

  .preview-wrap{position:relative;margin-top:1rem;text-align:center;display:none}
  .preview-wrap img{max-width:100%;max-height:300px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
  .preview-wrap .remove-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:1.1rem;cursor:pointer;line-height:32px}

  /* go button */
  .go-btn{width:100%;padding:.9rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ef6c00);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .25s;margin-top:.5rem}
  .go-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,138,101,.4)}
  .go-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

  /* model status */
  .model-status{font-size:.82rem;color:var(--text-light);margin-top:.6rem;text-align:center}
  .model-status.ready{color:var(--primary-dark)}

  /* progress / spinner */
  .progress-area{text-align:center;padding:2rem 0;display:none}
  .spinner{width:48px;height:48px;border:4px solid var(--primary-light);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .progress-text{color:var(--text-light);font-size:.95rem}
  .progress-bar-wrap{width:80%;max-width:300px;height:8px;background:var(--primary-light);border-radius:4px;margin:.8rem auto 0;overflow:hidden;display:none}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:4px;width:0%;transition:width .3s ease}

  /* results */
  .results-area{display:none}
  .result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}
  .result-card{background:#fff;border-radius:14px;box-shadow:var(--shadow);overflow:hidden;text-align:center}
  .result-card img{width:100%;aspect-ratio:1;object-fit:contain;background:#fafafa;padding:.5rem}
  .result-card .info{padding:.8rem 1rem}
  .result-card .obj-name{font-weight:600;margin-bottom:.5rem;color:var(--primary-dark);font-size:.95rem}
  .dl-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s}
  .dl-btn:hover{background:var(--primary-dark)}

  /* download all */
  .dl-all-wrap{text-align:center;margin-top:1rem}
  .dl-all-btn{padding:.7rem 2rem;border:2px solid var(--primary);border-radius:12px;background:#fff;color:var(--primary-dark);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
  .dl-all-btn:hover{background:var(--primary);color:#fff}

  /* error */
  .error-box{background:#ffebee;color:#c62828;border-radius:12px;padding:1rem 1.2rem;margin-top:1rem;font-size:.9rem;display:none;line-height:1.5}

  /* footer */
  .footer{text-align:center;padding:1.5rem;color:var(--text-light);font-size:.8rem}

  /* responsive */
  @media(max-width:480px){
    .header h1{font-size:1.4rem}
    .result-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="header">
  <span class="emoji">✂️📸</span>
  <h1>教材小幫手</h1>
  <p>上傳照片，AI 幫你把物件一個一個切出來！</p>
</div>

<div class="container">

  <!-- Step 1: Upload -->
  <div class="card">
    <div class="card-title"><span class="step">1</span> 上傳照片</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="icon">📷</div>
      <p>點擊或拖曳照片到這裡</p>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" alt="preview">
      <button class="remove-btn" id="removeBtn" title="移除">✕</button>
    </div>
  </div>

  <!-- Step 2: Go -->
  <div class="card">
    <div class="card-title"><span class="step">2</span> 開始擷取</div>
    <p style="font-size:.88rem;color:var(--text-light);margin-bottom:.8rem">
      AI 會自動偵測照片中的物件，並從原圖裁切出來。<br>
      <span style="font-size:.8rem">首次使用需下載約 40 MB 的 AI 模型（之後會快取）</span>
    </p>
    <button class="go-btn" id="goBtn">✨ AI 自動偵測並切割物件</button>
    <div class="model-status" id="modelStatus"></div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="spinner"></div>
    <div class="progress-text" id="progressText">正在準備 AI 模型…</div>
    <div class="progress-bar-wrap" id="progressBarWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-area" id="resultsArea">
    <div class="card">
      <div class="card-title">🎉 擷取完成！</div>
      <div class="result-grid" id="resultGrid"></div>
      <div class="dl-all-wrap" id="dlAllWrap" style="display:none">
        <button class="dl-all-btn" id="dlAllBtn">📦 全部下載</button>
      </div>
    </div>
  </div>

</div>

<div class="footer">教材小幫手 — Powered by Transformers.js — 100% 在你的瀏覽器中執行 🔒</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

env.allowLocalModels = false;

// ── State ──
let detector = null;
let modelLoading = false;
let originalImg = null;

// ── COCO label → Chinese name ──
const LABEL_ZH = {
  'person':'人物','bicycle':'腳踏車','car':'汽車','motorcycle':'機車',
  'airplane':'飛機','bus':'公車','train':'火車','truck':'卡車',
  'boat':'船','traffic light':'紅綠燈','fire hydrant':'消防栓',
  'stop sign':'停止標誌','parking meter':'停車計費器','bench':'長椅',
  'bird':'鳥','cat':'貓','dog':'狗','horse':'馬','sheep':'羊','cow':'牛',
  'elephant':'大象','bear':'熊','zebra':'斑馬','giraffe':'長頸鹿',
  'backpack':'背包','umbrella':'雨傘','handbag':'手提包','tie':'領帶',
  'suitcase':'行李箱','frisbee':'飛盤','skis':'滑雪板','snowboard':'滑雪板',
  'sports ball':'運動球','kite':'風箏','baseball bat':'棒球棒',
  'baseball glove':'棒球手套','skateboard':'滑板','surfboard':'衝浪板',
  'tennis racket':'網球拍','bottle':'瓶子','wine glass':'酒杯',
  'cup':'杯子','fork':'叉子','knife':'刀','spoon':'湯匙','bowl':'碗',
  'banana':'香蕉','apple':'蘋果','sandwich':'三明治','orange':'柳橙',
  'broccoli':'花椰菜','carrot':'胡蘿蔔','hot dog':'熱狗','pizza':'披薩',
  'donut':'甜甜圈','cake':'蛋糕','chair':'椅子','couch':'沙發',
  'potted plant':'盆栽','bed':'床','dining table':'餐桌','toilet':'馬桶',
  'tv':'電視','laptop':'筆電','mouse':'滑鼠','remote':'遙控器',
  'keyboard':'鍵盤','cell phone':'手機','microwave':'微波爐','oven':'烤箱',
  'toaster':'烤麵包機','sink':'水槽','refrigerator':'冰箱','book':'書',
  'clock':'時鐘','vase':'花瓶','scissors':'剪刀','teddy bear':'泰迪熊',
  'hair drier':'吹風機','toothbrush':'牙刷'
};

function translateLabel(label) {
  return LABEL_ZH[label] || label;
}

// ── DOM refs ──
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const goBtn = document.getElementById('goBtn');
const progressArea = document.getElementById('progressArea');
const progressText = document.getElementById('progressText');
const progressBarWrap = document.getElementById('progressBarWrap');
const progressBar = document.getElementById('progressBar');
const resultsArea = document.getElementById('resultsArea');
const resultGrid = document.getElementById('resultGrid');
const errorBox = document.getElementById('errorBox');
const modelStatus = document.getElementById('modelStatus');
const dlAllWrap = document.getElementById('dlAllWrap');

// ── Upload handling ──
uploadZone.addEventListener('click', () => fileInput.click());
['dragenter', 'dragover'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); uploadZone.classList.add('dragover'); }));
['dragleave', 'drop'].forEach(e => uploadZone.addEventListener(e, ev => { ev.preventDefault(); uploadZone.classList.remove('dragover'); }));
uploadZone.addEventListener('drop', ev => { if (ev.dataTransfer.files.length) handleFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });
document.getElementById('removeBtn').addEventListener('click', removeImage);

function handleFile(file) {
  if (!file.type.startsWith('image/')) { showError('請上傳圖片檔案'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    previewImg.src = dataUrl;
    previewWrap.style.display = 'block';
    uploadZone.style.display = 'none';
    const img = new Image();
    img.onload = () => { originalImg = img; };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  originalImg = null;
  previewWrap.style.display = 'none';
  uploadZone.style.display = '';
  fileInput.value = '';
}

// ── Error display ──
function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  setTimeout(() => errorBox.style.display = 'none', 8000);
}

// ── Model loading with progress ──
async function loadModel(onProgress) {
  if (detector) return detector;
  if (modelLoading) {
    while (modelLoading) await new Promise(r => setTimeout(r, 200));
    return detector;
  }
  modelLoading = true;
  try {
    detector = await pipeline('object-detection', 'Xenova/detr-resnet-50', {
      progress_callback: (data) => {
        if (data.status === 'progress' && onProgress) {
          const pct = Math.round(data.progress || 0);
          onProgress(pct, `下載 AI 模型中… ${pct}%`);
        }
      }
    });
    return detector;
  } catch (err) {
    detector = null;
    throw err;
  } finally {
    modelLoading = false;
  }
}

// ── Crop object from image using bounding box ──
function cropFromImage(img, box, label) {
  const w = img.naturalWidth, h = img.naturalHeight;
  // box: { xmin, ymin, xmax, ymax } in pixels from model
  const pad = 8; // small padding
  const x = Math.max(0, Math.round(box.xmin) - pad);
  const y = Math.max(0, Math.round(box.ymin) - pad);
  const x2 = Math.min(w, Math.round(box.xmax) + pad);
  const y2 = Math.min(h, Math.round(box.ymax) + pad);
  const cw = x2 - x, ch = y2 - y;
  if (cw <= 0 || ch <= 0) return null;

  const canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  canvas.getContext('2d').drawImage(img, x, y, cw, ch, 0, 0, cw, ch);
  return { name: translateLabel(label), dataUrl: canvas.toDataURL('image/png') };
}

// ── Main extraction flow ──
goBtn.addEventListener('click', startExtraction);

async function startExtraction() {
  if (!originalImg) { showError('請先上傳一張照片'); return; }

  goBtn.disabled = true;
  resultsArea.style.display = 'none';
  resultGrid.innerHTML = '';
  dlAllWrap.style.display = 'none';
  progressArea.style.display = 'block';
  errorBox.style.display = 'none';

  try {
    // Phase 1: Load model
    if (!detector) {
      progressText.textContent = '首次使用需下載 AI 模型（約 40 MB）…';
      progressBarWrap.style.display = 'block';
      progressBar.style.width = '0%';
      await loadModel((pct, msg) => {
        progressText.textContent = msg;
        progressBar.style.width = pct + '%';
      });
      progressBarWrap.style.display = 'none';
      modelStatus.textContent = '✅ AI 模型已就緒';
      modelStatus.classList.add('ready');
    }

    // Phase 2: Run object detection
    progressText.textContent = '🔍 AI 正在分析照片中的物件…';
    const detections = await detector(originalImg.src, { threshold: 0.7, percentage: false });

    if (!detections || detections.length === 0) {
      throw new Error('AI 未偵測到任何物件，請換一張更清楚的照片再試');
    }

    // Phase 3: Crop each detected object from original image
    progressText.textContent = '✂️ 正在裁切物件…';
    const results = [];
    for (const det of detections) {
      const result = cropFromImage(originalImg, det.box, det.label);
      if (result) {
        result.score = det.score;
        results.push(result);
      }
    }

    if (results.length === 0) {
      throw new Error('裁切失敗，請換一張照片再試');
    }

    // Phase 4: Display results
    progressArea.style.display = 'none';
    resultsArea.style.display = 'block';

    for (const r of results) {
      const card = document.createElement('div');
      card.className = 'result-card';
      const pct = r.score ? ` (${Math.round(r.score * 100)}%)` : '';
      card.innerHTML = `
        <img src="${r.dataUrl}" alt="${r.name}">
        <div class="info">
          <div class="obj-name">${r.name}${pct}</div>
          <button class="dl-btn" data-name="${r.name}">⬇️ 下載圖片</button>
        </div>`;
      resultGrid.appendChild(card);
    }

    // Download all button
    if (results.length >= 2) {
      dlAllWrap.style.display = 'block';
    }

    resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    progressArea.style.display = 'none';
    showError('❌ ' + (err.message || '發生未知錯誤'));
    console.error(err);
  } finally {
    goBtn.disabled = false;
  }
}

// ── Download handlers (event delegation) ──
resultGrid.addEventListener('click', (e) => {
  const btn = e.target.closest('.dl-btn');
  if (!btn) return;
  const card = btn.closest('.result-card');
  const img = card.querySelector('img');
  const a = document.createElement('a');
  a.href = img.src;
  a.download = `${btn.dataset.name}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

document.getElementById('dlAllBtn').addEventListener('click', () => {
  const cards = resultGrid.querySelectorAll('.result-card');
  cards.forEach((card, i) => {
    const img = card.querySelector('img');
    const name = card.querySelector('.obj-name').textContent;
    const a = document.createElement('a');
    a.href = img.src;
    a.download = `${name}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
});

// ── WebAssembly check ──
if (typeof WebAssembly === 'undefined') {
  showError('您的瀏覽器不支援 WebAssembly，請使用最新版 Chrome、Firefox 或 Safari。');
  goBtn.disabled = true;
}

// ── Preload model in background ──
setTimeout(async () => {
  if (detector) return;
  modelStatus.textContent = '⏳ 正在背景準備 AI 模型…';
  try {
    await loadModel((pct, msg) => {
      modelStatus.textContent = `⏳ ${msg}`;
    });
    modelStatus.textContent = '✅ AI 模型已就緒';
    modelStatus.classList.add('ready');
  } catch (e) {
    modelStatus.textContent = '模型將在使用時下載';
    console.warn('Background model preload failed:', e);
  }
}, 1500);
</script>
</body>
</html>
